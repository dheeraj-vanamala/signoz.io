<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#bfc7d3">
    Temporal Architecture
  </text>

  <!-- Temporal Client -->
  <g>
    <rect x="50" y="70" width="180" height="80" rx="8" fill="url(#purpleGrad)" stroke="#6d28d9" stroke-width="2"/>
    <text x="140" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Temporal Client
    </text>
    <text x="140" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#e9d5ff">
      Starts workflows
    </text>
    <text x="140" y="142" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#e9d5ff">
      Sends signals and queries
    </text>
  </g>

  <!-- Temporal Server -->
  <g>
    <rect x="310" y="70" width="180" height="80" rx="8" fill="url(#blueGrad)" stroke="#1d4ed8" stroke-width="2"/>
    <text x="400" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Temporal Server
    </text>
    <text x="400" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#dbeafe">
      Manages workflow state
    </text>
    <text x="400" y="142" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#dbeafe">
      Schedules tasks
    </text>
  </g>

  <!-- Temporal Worker -->
  <g>
    <rect x="570" y="70" width="180" height="80" rx="8" fill="url(#greenGrad)" stroke="#059669" stroke-width="2"/>
    <text x="660" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Temporal Worker
    </text>
    <text x="660" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#d1fae5">
      Executes workflows
    </text>
    <text x="660" y="142" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#d1fae5">
      Runs business logic
    </text>
  </g>

  <!-- Arrows between Client, Server, Worker -->
  <g>
    <path d="M 230 110 L 310 110" fill="none" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
    <path d="M 490 110 L 570 110" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Activities below Worker -->
  <g>
    <rect x="570" y="210" width="180" height="80" rx="8" fill="url(#orangeGrad)" stroke="#b45309" stroke-width="2"/>
    <text x="660" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      Activities
    </text>
    <text x="660" y="265" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#fef3c7">
      Individual tasks
    </text>
    <text x="660" y="282" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#fef3c7">
      (API calls, DB updates)
    </text>
  </g>

  <!-- Arrow from Worker to Activities -->
  <g>
    <path d="M 660 150 L 660 210" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Persistence layer -->
  <g>
    <rect x="310" y="210" width="180" height="80" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
    <text x="400" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#374151">
      Persistence Layer
    </text>
    <text x="400" y="265" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">
      PostgreSQL, MySQL,
    </text>
    <text x="400" y="282" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">
      Cassandra, or Elasticsearch
    </text>
  </g>

  <!-- Arrow from Server to Persistence -->
  <g>
    <path d="M 400 150 L 400 210" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Labels on arrows -->
  <g>
    <rect x="240" y="95" width="60" height="24" rx="4" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="270" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#6d28d9">
      gRPC
    </text>
  </g>

  <g>
    <rect x="500" y="95" width="60" height="24" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="530" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#059669">
      Poll
    </text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(50, 360)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
      Workers poll the server for tasks. The server persists workflow state for fault tolerance.
    </text>
  </g>
</svg>
